<!DOCTYPE html>
<html lang="en" >
<head>
  <meta charset="UTF-8">
  <title>CodePen - Advanced Topics Matrix Calculator</title>
  <link rel="stylesheet" href="./style.css">

</head>
<body>
<!-- partial:index.partial.html -->
<h1>3x3 Matrix Calculator w/ Supplements</h1>

<button id=infobutton onclick="myFunction()">Other Tools</button>

<div id="myDIV">
  <iframe id=geogebra src="https://www.geogebra.org/geometry" style="width:96%;height:650px;"></iframe>
  <div id=calculator class="calculator">
  <div class="input" id="input"></div>
  <div class="buttons">
    <div class="operators">
      <div>+</div>
      <div>-</div>
      <div>&times;</div>
      <div>&divide;</div>
    </div>
    <div class="leftPanel">
      <div class="numbers">
        <div>7</div>
        <div>8</div>
        <div>9</div>
      </div>
      <div class="numbers">
        <div>4</div>
        <div>5</div>
        <div>6</div>
      </div>
      <div class="numbers">
        <div>1</div>
        <div>2</div>
        <div>3</div>
      </div>
      <div class="numbers">
        <div>0</div>
        <div>.</div>
        <div id="clear">C</div>
      </div>
    </div>
    <div class="equal" id="result">=</div>
  </div>
</div>
</div>

<table cellpadding="15" cellspacing="15" width="750">
<tr>
<td width="250"><form name="A">
  <p>Matrix <b>A</b> :<br />
  <input type="text" name="a11" size="4"> <input type="text" name="a12" size="4"> <input
  TYPE="text" NAME="a13" SIZE="4"> <br />
  <input type="text" name="a21" size="4"> <input type="text" name="a22" size="4"> <input
  TYPE="text" NAME="a23" SIZE="4"> <br />
  <input type="text" name="a31" size="4"> <input type="text" name="a32" size="4"> <input
  TYPE="text" NAME="a33" SIZE="4"> </p>
  <p><input type="reset" value="Clear A" size="5"></p>
</form>
</td>
<td width="250"><form name="B">
  <p>Matrix <b>B</b> :<br />
  <input type="text" name="a11" size="4"> <input type="text" name="a12" size="4"> <input
  TYPE="text" NAME="a13" SIZE="4"> <br />
  <input type="text" name="a21" size="4"> <input type="text" name="a22" size="4"> <input
  TYPE="text" NAME="a23" SIZE="4"> <br />
  <input type="text" name="a31" size="4"> <input type="text" name="a32" size="4"> <input
  TYPE="text" NAME="a33" SIZE="4"> </p>
  <p><input type="reset" value="Clear B" size="5"></p>
</form>
</td>
<td width="250"><form name="C">
  <p>Matrix <b>C</b> :<br />
  <input type="text" name="a11" size="4"> <input type="text" name="a12" size="4"> <input
  TYPE="text" NAME="a13" SIZE="4"> <br />
  <input type="text" name="a21" size="4"> <input type="text" name="a22" size="4"> <input
  TYPE="text" NAME="a23" SIZE="4"> <br />
  <input type="text" name="a31" size="4"> <input type="text" name="a32" size="4"> <input
  TYPE="text" NAME="a33" SIZE="4"> </p>
  <p><input type="reset" value="Clear C" size="5"></p>
</form>
</td>
</tr>
</table>

<table cellspacing="5" cellpadding="5">
<tr>
<td valign="TOP"><form name="ReArrange">
  <table width="150">
    <tr>
      <th>ReArrange</th>
    </tr>
    <tr>
      <td><input id=button type="button" value="Swap C for A" onClick="swap(C,A)"></td>
    </tr>
    <tr>
      <td><input id=button type="button" value="Swap C for B" onClick="swap(C,B)"></td>
    </tr>
    <tr>
      <td><input id=button type="button" value="Swap A for B" onClick="swap(A,B)"></td>
    </tr>
    <tr>
      <td><input id=button  type="button" value="Swap B for A" onClick="swap(B,A)"></td>
    </tr>
    <tr>
      <td><input id=button type="button" value="Swap A for C" onClick="swap(A,C)"></td>
    </tr>
  </table>
</form>
</td>
<td valign="TOP"><form name="Operations">
  <table width="250">
    <tr>
      <th colspan="2">Operations</th>
    </tr>
    <tr>
      <td><input id=button type="button" value="A + B = C" onClick="add(A,B,C)"></td>
    </tr>
    <tr>
      <td><input id=button type="button" value="A * B = C" onClick="mult(A,B,C)"></td>
      <td><input id=button type="button" value="inv(A) = C" onClick="inv(A,deta,C)"> </td>
    </tr>
    <tr>
      <td><input id=button type="button" value="B * A = C" onClick="mult(B,A,C)"></td>
      <td><input id=button type="button" value="inv(B) = C" onClick="inv(B,detb,C)"> </td>
    </tr>
  </table>
</form>
</td>
<td>&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;&nbsp;</td>
<td valign="TOP"><table width="300">
  <tr>
    <th>Determinant</th>
  </tr>
  <tr>
    <td><form name="deta">
      <p><input id=button type="button" value="det(A)" onClick="det(A, deta)"> <input TYPE="text"
      NAME="output" SIZE="10"></p>
    </form>
    </td>
  </tr>
  <tr>
    <td><form name="detb">
      <p><input id=button type="button" value="det(B)" onClick="det(B,detb)"> <input TYPE="text"
      NAME="output" SIZE="10"> </p>
    </form>
    </td>
  </tr>
</table>
</td>
</tr>
</table>
<!-- partial -->
  <script  src="./script.js"></script>

</body>
</html>
